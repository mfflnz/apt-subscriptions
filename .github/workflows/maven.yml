name: Java CI with Maven in Linux

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: 1.8
        distribution: temurin
    - name: Build with Maven
      run: mvn -f apt-exam-project/pom.xml clean verify