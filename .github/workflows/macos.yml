on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest 
    strategy:
      matrix:
        java: [ 8, 11, 17 ]
      fail-fast: false

    name: Build with Java ${{ matrix.java }} on macOS
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
    - name: Build with Maven
      run: >
        mvn clean verify
        -Pjacoco -X org.pitest:pitest-maven:mutationCoverage
      